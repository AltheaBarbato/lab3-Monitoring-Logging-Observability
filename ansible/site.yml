---
- name: Bootstrap Python 3.9 on target
  hosts: webservers
  gather_facts: false
  become: true
  tasks:
    - name: Ensure Python 3.9 is available
      raw: test -x /usr/bin/python3.9 || (apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3.9)
      changed_when: false

- import_playbook: playbooks/01-security-metrics.yml
- import_playbook: playbooks/02-prometheus.yml
- import_playbook: playbooks/03-grafana.yml
- import_playbook: playbooks/04-uptime-kuma.yml
